id: api-contract-reviewer
description: ngk api-contract-reviewer specialist.
mode: read_only
scope:
  domains:
  - api
  - backend
  include_paths: []
  exclude_paths:
  - .env
  - '**/*secret*'
  - '**/*key*'
tools:
  allowed_builtin:
  - read
  - grep
  - shell
  allowed_ngk_tools:
  - ngk tool sources
  - ngk tool fact
  - ngk tool trace
  - ngk tool contract check
  denied_shell_patterns:
  - ngk orchestrate
  - ngk delegate
  - git commit
  - git push
  - rm -rf
  - npm install
  - pip install
forbidden_actions:
- modify files
- commit changes
- push changes
- install dependencies
- nested orchestration
output_contract: ngk_agent_result_v1
max_runtime_seconds: 240
max_findings: 20
max_context_facts: 30
prompt_template: api-contract-reviewer.md
